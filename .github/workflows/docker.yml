name: Docker

on:
  push:
    tags:
      - "kuiper-forge-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. kuiper-forge-v0.4.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: astrohq/kuiper-forge

jobs:
  build:
    name: Build ${{ matrix.db_backend }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        db_backend: [sqlite, postgres]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG##*-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/kuiper-forge/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: DB_BACKEND=${{ matrix.db_backend }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.db_backend }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.db_backend }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.db_backend }}-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push Manifest (${{ matrix.db_backend }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db_backend: [sqlite, postgres]
    steps:
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG##*-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.db_backend }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.meta.outputs.version }}"

          if [[ "${{ matrix.db_backend }}" == "sqlite" ]]; then
            TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:latest -t ${IMAGE}:${VERSION}-sqlite -t ${IMAGE}:sqlite"
          else
            TAGS="-t ${IMAGE}:${VERSION}-postgres -t ${IMAGE}:postgres"
          fi

          docker buildx imagetools create ${TAGS} \
            $(printf "${IMAGE}@sha256:%s " *)
